<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Briefing Note AI upload step demo screenshot</title>
  <desc id="desc">Fictional demo data for Aoba Future Link upload screen.</desc>
  <rect width="1280" height="820" fill="#f8fafc"/>
  <g transform="translate(160 56)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Briefing Note AI</text>
    <text x="0" y="36" font-family="Arial, sans-serif" font-size="18" fill="#475569">企業説明会の紙メモを、就活で使える Markdown に変換します。</text>
    <g transform="translate(0 86)" font-family="Arial, sans-serif" font-size="15">
      <circle cx="20" cy="18" r="18" fill="#0f766e"/><text x="15" y="24" fill="white" font-weight="700">1</text><text x="48" y="23" fill="#0f172a" font-weight="700">アップロード</text>
      <line x1="162" y1="18" x2="310" y2="18" stroke="#cbd5e1" stroke-width="2"/>
      <circle cx="340" cy="18" r="18" fill="#e2e8f0"/><text x="335" y="24" fill="#64748b" font-weight="700">2</text><text x="368" y="23" fill="#64748b">OCR確認</text>
      <line x1="472" y1="18" x2="620" y2="18" stroke="#cbd5e1" stroke-width="2"/>
      <circle cx="650" cy="18" r="18" fill="#e2e8f0"/><text x="645" y="24" fill="#64748b" font-weight="700">3</text><text x="678" y="23" fill="#64748b">Markdown編集</text>
    </g>
    <rect x="0" y="152" width="960" height="590" rx="14" fill="white" stroke="#e2e8f0"/>
    <g transform="translate(48 200)" font-family="Arial, sans-serif">
      <text x="0" y="0" font-size="24" font-weight="700" fill="#0f172a">メモ画像をアップロード</text>
      <text x="0" y="30" font-size="15" fill="#64748b">紙の企業説明会メモを撮影した画像を 1 枚選択します。</text>
      <rect x="0" y="62" width="864" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10 8"/>
      <text x="238" y="134" font-size="18" fill="#475569">ここに画像をドラッグ&amp;ドロップ、またはファイルを選択してください。</text>
      <text x="333" y="164" font-size="15" fill="#64748b">対応形式: JPEG, PNG, WebP(最大 5MB)</text>
      <rect x="370" y="188" width="124" height="40" rx="8" fill="white" stroke="#0f766e"/>
      <text x="387" y="214" font-size="15" font-weight="700" fill="#0f766e">ファイルを選択</text>
      <text x="0" y="300" font-size="15" font-weight="700" fill="#0f172a">企業・説明会情報(任意)</text>
      <text x="0" y="326" font-size="14" fill="#64748b">Markdown 生成に使います。架空サンプルデータのみを入力しています。</text>
      <text x="0" y="368" font-size="14" font-weight="700" fill="#0f172a">企業名</text>
      <rect x="0" y="382" width="864" height="42" rx="8" fill="white" stroke="#cbd5e1"/><text x="16" y="409" font-size="15" fill="#0f172a">青葉フューチャーリンク株式会社</text>
      <text x="0" y="456" font-size="14" font-weight="700" fill="#0f172a">イベント名</text>
      <rect x="0" y="470" width="864" height="42" rx="8" fill="white" stroke="#cbd5e1"/><text x="16" y="497" font-size="15" fill="#0f172a">26卒向け オンライン会社説明会</text>
      <text x="0" y="544" font-size="14" font-weight="700" fill="#0f172a">説明会日</text>
      <rect x="0" y="558" width="230" height="42" rx="8" fill="white" stroke="#cbd5e1"/><text x="16" y="585" font-size="15" fill="#0f172a">2026-06-12</text>
      <rect x="704" y="558" width="160" height="42" rx="8" fill="#0f766e"/><text x="730" y="585" font-size="15" font-weight="700" fill="white">OCR を実行する</text>
    </g>
  </g>
</svg>
