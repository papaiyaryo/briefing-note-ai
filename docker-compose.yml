services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-briefing-note-ai}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next

volumes:
  node_modules:
  next_cache:
