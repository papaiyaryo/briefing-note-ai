name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: package-manager
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "runner=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "runner=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "runner=npm run" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ steps.package-manager.outputs.manager }}

      - name: Enable Corepack
        if: steps.package-manager.outputs.manager != 'npm'
        run: corepack enable

      - name: Install dependencies
        run: ${{ steps.package-manager.outputs.install }}

      - name: Lint
        run: ${{ steps.package-manager.outputs.runner }} lint

      - name: Typecheck
        run: ${{ steps.package-manager.outputs.runner }} typecheck

      - name: Test
        run: ${{ steps.package-manager.outputs.runner }} test

      - name: Build
        run: ${{ steps.package-manager.outputs.runner }} build
