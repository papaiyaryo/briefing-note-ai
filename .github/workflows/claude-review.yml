name: Claude Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude Code
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Explicitly use the workflow token for GitHub API calls so PRs that update
          # this workflow do not fail Claude Code Action's GitHub App workflow validation.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: true
          prompt: |
            この PR を AGENTS.md と docs/ のルールに従ってレビューしてください。

            この workflow はレビュー専用です。リポジトリ内のファイル編集、commit、push、PR ブランチの変更は行わず、レビュー結果コメントの投稿だけを行ってください。

            PR コメントに投稿するレビュー結果には、機械判定用に以下の 3 行を必ずそのまま含めてください。
            <!-- claude-review-result -->
            Claude Review Run: ${{ github.run_id }}
            Claude Review Head SHA: ${{ github.event.pull_request.head.sha }}

            観点:
            - 対象 Issue の Scope / Acceptance Criteria に収まっているか
            - 1 PR で複数 Issue を解決していないか
            - MVP スコープ外の機能を先行実装していないか
            - 秘密情報・APIキー・.env を含めていないか
            - 事実・所感・Web 情報を混在させていないか（Product Principle）
            - lint / typecheck / test / build が通る見込みか
            必ず GitHub の PR コメントにレビュー結果を投稿してください。
            指摘がある場合は、修正できるように以下を含めてください。
            - 重要度
            - 対象ファイル / 行
            - 問題点
            - 推奨修正
            指摘がない場合でも「Claude Review: 指摘なし」として、確認した観点と理由を PR コメントに投稿してください。
            スコープ外の問題は「フォローアップ Issue 候補」として分けて記載してください。

      - name: Verify Claude review comment was posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CLAUDE_REVIEW_MARKER: '<!-- claude-review-result -->'
          CLAUDE_REVIEW_RUN: 'Claude Review Run: ${{ github.run_id }}'
          CLAUDE_REVIEW_HEAD: 'Claude Review Head SHA: ${{ github.event.pull_request.head.sha }}'
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            if gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
              --jq '.[] | select(.body | contains(env.CLAUDE_REVIEW_MARKER) and contains(env.CLAUDE_REVIEW_RUN) and contains(env.CLAUDE_REVIEW_HEAD)) | .html_url' \
              | tee /tmp/claude-review-comment-url \
              | grep -q .; then
              echo "Claude review comment found: $(tail -n 1 /tmp/claude-review-comment-url)"
              exit 0
            fi

            echo "Claude review comment with the required marker was not found yet (attempt ${attempt}/12)."
            sleep 5
          done

          echo "Claude review comment was not found on the PR." >&2
          echo "Expected a PR issue comment containing all of:" >&2
          echo "- ${CLAUDE_REVIEW_MARKER}" >&2
          echo "- ${CLAUDE_REVIEW_RUN}" >&2
          echo "- ${CLAUDE_REVIEW_HEAD}" >&2
          exit 1
